<div *ngIf="(contactMe == null)">
	<p><em>Loading...</em></p>
</div>

<div *ngIf="(contactMe != null)">

    <mat-grid-list cols="2" rowHeight="100px" class="grid-list">
        @for (contact of contactMe; track contact) {
        <mat-grid-tile [colspan]="contact.colspan" [rowspan]="contact.rowspan"
         *ngIf="contact.visible"
         class="grid-tile">

            <mat-card class="contact-card">
                <mat-card-header>
                    <mat-card-title-group>
                        <mat-card-title><i [class]="contact.icon"></i> {{contact.name}}</mat-card-title>
                    </mat-card-title-group>
                </mat-card-header>
                <mat-card-content class="content">
                    <p>{{contact.value}}</p>
                </mat-card-content>
            </mat-card>

        </mat-grid-tile>
        }
    </mat-grid-list>

</div>
