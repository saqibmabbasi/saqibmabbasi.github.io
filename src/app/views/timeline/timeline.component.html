<!-- align="alternate" -->

<div class="card">
    <p-timeline [value]="timeline" styleClass="customized-timeline">

        <ng-template pTemplate="marker" let-event>
            <span
                class="flex w-2rem h-2rem align-items-center justify-content-center text-white border-circle z-1 shadow-1"
                [style]="{ 'color': event.color }">
                <i [class]="event.icon" style="font-size: 2.5rem"></i>
            </span>
        </ng-template>

        <ng-template pTemplate="content" let-event>
            <p-card [header]="event.domain" [subheader]="event.field">
                <ul>
                    @for (s of event.scope; track s) {
                    <li style="color: black;">{{s}}</li>
                    }
                </ul>
            </p-card>
        </ng-template>

        <ng-template pTemplate="opposite" let-event>
            <p-card [header]="event.organization" [subheader]="event.fromDate + ' - ' + event.toDate">
                <p>{{event.location}}</p>
                <!-- <p>{{event.domain}}</p> -->
                <!-- <p>{{event.field}}</p> -->
                <p>{{event.type}}</p>
            </p-card>
        </ng-template>

    </p-timeline>
</div>
