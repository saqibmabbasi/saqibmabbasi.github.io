<h1>Academics</h1>

<div *ngIf="(academics == null)">
  <p><em>Loading...</em></p>
</div>

<div class="container" *ngIf="(academics != null)">

    <!-- <mat-tree>
        <mat-tree-node *ngFor="let academic of academics">
            {{academic.instituteName}}
        </mat-tree-node>
    </mat-tree> -->


    <mat-tree [dataSource]="dataSource" [treeControl]="treeControl">
        <!-- This is the tree node template for leaf nodes -->
        <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
          <!-- use a disabled button to provide padding for tree leaf -->
          <button mat-icon-button disabled></button>
          {{node.name}} a
          <div class="setBorder"></div>
        </mat-tree-node>
        <!-- This is the tree node template for expandable nodes -->
        <mat-tree-node *matTreeNodeDef="let node;when: hasChild" matTreeNodePadding>
          <button mat-icon-button matTreeNodeToggle
                  [attr.aria-label]="'Toggle ' + node.name">
            <mat-icon class="mat-icon-rtl-mirror">
              {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
            </mat-icon>
          </button>
          {{node.name}} b
          <div class="setBorder"></div>
        </mat-tree-node>
      </mat-tree>


    <hr style="height: 1px;" color="red" />


    <mat-tree [dataSource]="dataSource" [treeControl]="treeControl">
        <!-- This is the tree node template for leaf nodes -->
        <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
          <!-- use a disabled button to provide padding for tree leaf -->
          <button mat-icon-button disabled></button>
          {{node.name}} a
        </mat-tree-node>
        <!-- This is the tree node template for expandable nodes -->
        <mat-tree-node *matTreeNodeDef="let node;when: hasChild" matTreeNodePadding>
          <button mat-icon-button matTreeNodeToggle
                  [attr.aria-label]="'Toggle ' + node.name">
            <mat-icon class="mat-icon-rtl-mirror">
              {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
            </mat-icon>
          </button>
          {{node.name}} b
        </mat-tree-node>
      </mat-tree>






  <div class="row">
    <!-- Section: Timeline -->
    <section class="py-5">
      <ul class="timeline-with-icons">
        <li class="timeline-item mb-5" *ngFor="let academic of academics">
          <span class="timeline-icon">
              <!-- <i class="fas fa-rocket text-primary fa-sm fa-fw"></i> -->
              <i class="fa-solid fa-school text-primary "></i>
          </span>
          <h5 class="fw-bold">{{academic.instituteName}}</h5>
          <p class="text-muted mb-2 fw-bold">{{academic.year}}</p>
          <p class="text-muted">{{academic.campusName}}</p>
          <p class="text-muted">{{academic.fieldOfStudy}}</p>
        </li>
      </ul>
    </section>
    <!-- Section: Timeline -->
  </div>
</div>
